  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: 'Space Grotesk', sans-serif; color: #fff; min-height: 100vh; }

    .app { min-height: 100vh; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 0 16px 60px; user-select: none; }

    .header { width: 100%; max-width: 400px; display: flex; align-items: center; justify-content: center; padding: 20px 0 4px; position: relative; }
    .header-title { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
    .header-icons { position: absolute; right: 0; display: flex; gap: 10px; }
    .icon-btn { background: none; border: none; color: #777; font-size: 18px; cursor: pointer; padding: 4px; transition: color 0.15s; }
    .icon-btn:hover { color: #ccc; }

    .sub-label { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

    .grid { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 14px; }
    .grid-row { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .tiles { display: flex; gap: 4px; justify-content: center; }

    .tile { width: 56px; height: 56px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .tile.anchor-start { background: #6C5CE7; }
    .tile.anchor-end   { background: #16a34a; }
    .tile.changed { box-shadow: 0 0 0 3px rgba(255,255,255,0.38); }

    .cursor-tile { width: 56px; height: 56px; border-radius: 8px; background: #2a2a2a; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0; transition: border-color 0.15s; }
    .cursor-tile.lit { border-color: #888; }
    .cursor-tile.caret::after { content: ''; display: inline-block; width: 2px; height: 22px; background: #aaa; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .hidden-input { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }

    .shake { animation: shake 0.35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

    .feedback-bar { height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; letter-spacing: 0.5px; color: #e07070; margin-bottom: 10px; }
    .feedback-bar.loading { color: #999; }

    .submit-btn { background: #fff; color: #111; border: none; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; padding: 12px 32px; cursor: pointer; margin-bottom: 22px; transition: opacity 0.15s, transform 0.1s; }
    .submit-btn:hover:not(:disabled) { opacity: 0.85; }
    .submit-btn:active:not(:disabled) { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .countdown-pill { border: 1.5px solid #333; border-radius: 999px; padding: 11px 26px; font-size: 14px; color: #bbb; margin-bottom: 16px; }
    .countdown-pill strong { font-family: 'Space Mono', monospace; font-weight: 700; color: #fff; }

    .footer-links { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 14px; color: #777; }
    .footer-links a { color: #60a5fa; text-decoration: underline; cursor: pointer; }

    /* WIN MODAL */

    .win-box { background: #1c1c1c; border: 1px solid #2e2e2e; border-radius: 20px; padding: 40px 36px; text-align: center; max-width: 380px; width: 90%; animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1); }

    .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 14px; }

    .ex-row { display: flex; gap: 4px; align-items: center; }
    .ex-tile { width: 44px; height: 44px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: #fff; }

    .modal-close:hover { color: #fff; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    .stat-box { background: #242424; border-radius: 10px; padding: 16px 12px; text-align: center; }
    .stat-box-val { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
    .stat-box-val.green { color: #4ade80; }

    .stat-box-lbl { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }
    .streak-bar { margin-top: 16px; }
    .streak-bar-label { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .streak-bar-track { height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
    .streak-bar-fill { height: 100%; background: linear-gradient(90deg, #6C5CE7, #4ade80); border-radius: 3px; transition: width 0.6s ease; }

    const { useState, useEffect, useRef } = React;

    const WORD_PAIRS = [
      ["SAND","TRAP"],["COLD","WARM"],["FIRE","WIND"],["LEAD","GOLD"],

    const WORD_LIST = new Set("aahs abed abet able ably abut aced aces ache achy acid acme acne acre acts adds adze aged ages agog ague ahem aide aids aims airs airy ajar akin ally alms aloe also alto alum amok amps anew ante ants apes apex arch area aria arid arks arms army arts ashy asks atom atop aunt auto avid avow away awed axes axis axle babe baby back bade bail bait bake bald bale ball balm band bane bang bank bare bark barn bars base bash bask bass bath bats baud bawl bead beak beam bean bear beat beds beef been beer beet bell belt best bile bill bind bird bite bits blew bloc blot blow blue blur boar boat body bold bolt bond bone book boom bore born boss bout bowl brag brew brim brow buck buff bulb bulk bull bump bunk burn bury bust busy butt buzz cage cake calf call calm came camp cane card care carp cart case cash cast cave cell char chat chef chin chip chop chow cite city clam clap claw clay clip clod clog clop clot club clue coal coat coil coin cold come cone conk cook cool cope copy cord cork corn cost cozy crab crew crop crow cube curb cure curl curt cute czar dabs daft dame damp dare dark darn dart dash data date dawn days daze dead deaf deal dear debt deck deed deem deep deft deli dent deny desk dial dice diet dill dime dine ding dips dire dirt disc dish disk dive dock dolt dome done doom dorm dose dote dove down drab drag draw drew drip drop drum dual duel dung dupe dusk dust duty dyes each earl earn ease east easy edge edit eggs else emit envy epic even ever evil exam exit expo face fact fade fail fair fake fall fame farm fast fate fawn faze feat feed feel feet fell felt fend fern file fill film find fine fire firm fish fist flag flap flat flaw flea flew flex flip flit flog flop flow foam foil folk fond font food fool foot fore fork form fort foul fowl free frog from fuel full fume fund fuse fuss fuzz gale gall game gape garb gash gasp gate gave gawk gaze gear gent germ gift gild gill gist give glad glee glob glow glue glum gnar goad goat goes gold     // ── Helpers ────────────────────────────────────────────────────
    function getDailyPair() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const day = Math.floor((now - start) / 86400000);
      return WORD_PAIRS[day % WORD_PAIRS.length];
    }

    function getTodayKey() {
      const d = new Date();
      return `ladder-best-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    }

    function getCountdown() {
      const now = new Date();
      const tom = new Date(now); tom.setHours(24,0,0,0);
      const diff = tom - now;
      const h = String(Math.floor(diff/3600000)).padStart(2,"0");
      const m = String(Math.floor((diff%3600000)/60000)).padStart(2,"0");
      const s = String(Math.floor((diff%60000)/1000)).padStart(2,"0");
      return `${h}:${m}:${s}`;
    }

    function letterDiff(a, b) {
      let d = 0;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
      return d;
    }

    function diffPositions(a, b) {
      const pos = [];
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) pos.push(i);
      return pos;
    }

    function loadStats() {
      try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {played:0,wins:0,streak:0,bestStreak:0,totalSteps:0,lastWinDate:null}; }
      catch { return {played:0,wins:0,streak:0,bestStreak:0,totalSteps:0,lastWinDate:null}; }
    }

    function saveStats(s) { localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

    async function isRealWord(word) {
      if (WORD_LIST.has(word.toLowerCase())) return true;
      // API fallback for words not in local list (works when hosted/local, blocked in claude.ai sandbox)
      try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
        return res.ok;
      } catch { return false; }
    }

    // ── Confetti ───────────────────────────────────────────────────
    function Confetti({ active }) {
      const canvasRef = useRef(null);
      const rafRef = useRef(null);
      const particles = useRef([]);

      useEffect(() => {
        if (!active) return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        particles.current = Array.from({ length: 160 }, () => ({
          x: Math.random() * canvas.width,
          y: -10 - Math.random() * 200,
          r: 5 + Math.random() * 7,
          color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
          vx: (Math.random() - 0.5) * 4,
          vy: 3 + Math.random() * 5,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.2,
          shape: Math.random() > 0.5 ? "rect" : "circle",
          w: 8 + Math.random() * 10,
          h: 4 + Math.random() * 6,
          alpha: 1,
        }));

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let alive = false;
          particles.current.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.rotV;
            if (p.y > canvas.height * 0.7) p.alpha -= 0.018;
            if (p.alpha > 0) alive = true;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.alpha);
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            if (p.shape === "rect") ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            else { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
            ctx.restore();
          });
          if (alive) rafRef.current = requestAnimationFrame(draw);
          else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        rafRef.current = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(rafRef.current);
      }, [active]);

      return <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:200,display:active?"block":"none"}} />;
    }

    // ── Main App ───────────────────────────────────────────────────
    function App() {
      const [pair]            = useState(getDailyPair);
      const [rows, setRows]   = useState([]);
      const [input, setInput] = useState([]);
      const [loading, setLoading] = useState(false);
      const [feedback, setFeedback] = useState({ text:"", type:"" });
      const [won, setWon]     = useState(false);
      const [bestToday, setBestToday] = useState(null);
      const [newRecord, setNewRecord] = useState(false);
      const [countdown, setCountdown] = useState(getCountdown());
      const [showHelp, setShowHelp]   = useState(false);
      const [showStats, setShowStats] = useState(false);
      const [stats, setStats] = useState(loadStats);
      const [shaking, setShaking] = useState(false);
      const [confetti, setConfetti]   = useState(false);
      const inputRef = useRef(null);

      const [startWord, endWord] = pair;
      const wordLen = startWord.length;
      const allWords = [startWord, ...rows.map(r => r.word)];
      const currentWord = allWords[allWords.length - 1];
      const today = new Date().toLocaleDateString("en-US", { month:"long", day:"numeric" });

      useEffect(() => {
        const s = localStorage.getItem(getTodayKey());
        if (s) setBestToday(parseInt(s));
      }, []);

      useEffect(() => {
        const t = setInterval(() => setCountdown(getCountdown()), 1000);
        return () => clearInterval(t);
      }, []);

      const focus = () => inputRef.current?.focus();

      function handleKey(e) {
        if (won || loading) return;
        const key = e.key.toUpperCase();
        if (/^[A-Z]$/.test(key) && input.length < wordLen) {
          setInput(prev => [...prev, key]);
          setFeedback({ text:"", type:"" });
        } else if (e.key === "Backspace") {
          setInput(prev => prev.slice(0,-1));
          setFeedback({ text:"", type:"" });
        } else if (e.key === "Enter") {
          handleSubmit();
        }
      }

      async function handleSubmit() {
        const word = input.join("");
        if (word.length !== wordLen || loading || won) return;

        const diff = letterDiff(currentWord, word);
        if (diff === 0) { triggerError("Same as current word"); return; }
        if (diff !== 1) { triggerError(`Change exactly 1 letter (changed ${diff})`); return; }
        if (allWords.includes(word)) { triggerError("Already used that word"); return; }

        setLoading(true);
        setFeedback({ text: "Checking…", type: "loading" });

        const valid = await isRealWord(word);

        if (!valid) {
          triggerError(`"${word}" isn't a valid word`);
          setLoading(false);
          return;
        }

        const changedPos = diffPositions(currentWord, word);
        const newRows = [...rows, { word, changedPos }];
        setRows(newRows);
        setInput([]);
        setFeedback({ text:"", type:"" });

        if (word === endWord) {
          const steps = newRows.length;
          const key = getTodayKey();
          const existing = localStorage.getItem(key);
          const isNew = !existing || steps < parseInt(existing);
          if (isNew) { localStorage.setItem(key, String(steps)); setBestToday(steps); setNewRecord(true); }

          const todayStr = new Date().toDateString();
          const s = loadStats();
          s.played += 1; s.wins += 1; s.totalSteps += steps;
          const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
          s.streak = (s.lastWinDate === yesterday.toDateString() || s.lastWinDate === todayStr) ? s.streak+1 : 1;
          s.bestStreak = Math.max(s.bestStreak, s.streak);
          s.lastWinDate = todayStr;
          saveStats(s); setStats(s);

          setConfetti(true);
          setTimeout(() => setWon(true), 400);
          setTimeout(() => setConfetti(false), 4000);
        }

        setLoading(false);
        setTimeout(focus, 50);
      }

      function triggerError(msg) {
        setFeedback({ text:msg, type:"error" });
        setShaking(true);
        setTimeout(() => setShaking(false), 400);
      }

      function reset() {
        setRows([]); setInput([]); setFeedback({text:"",type:""});
        setWon(false); setNewRecord(false); setConfetti(false);
        setTimeout(focus, 50);
      }

      function WordRow({ word, prevWord, color, anchor, isEnd }) {
        const changed = prevWord ? diffPositions(prevWord, word) : [];
        return (
          <div className="grid-row">
            <div className="tiles">
              {word.split("").map((l,i) => (
                <div key={i}
                  className={`tile ${anchor ? (isEnd ? "anchor-end" : "anchor-start") : "filled"}${changed.includes(i) ? " changed" : ""}`}
                  style={anchor ? {} : { background: color }}
                >{l}</div>
              ))}
            </div>
          </div>
        );
      }

      function ActiveRow() {
        return (
          <div className="grid-row">
            <div className={`tiles${shaking ? " shake" : ""}`}>
              {input.map((l,i) => <div key={i} className="cursor-tile lit">{l}</div>)}
              {input.length < wordLen && <div className="cursor-tile lit caret" />}
              {Array.from({length: Math.max(0, wordLen-input.length-1)}).map((_,i) => <div key={i} className="cursor-tile" />)}
            </div>
          </div>
        );
      }

      const exWords = ["COLD","CORD","WORD","WARD","WARM"];

      function shareWhatsApp() {
        const emojiRows = rows.map((r,i) =>
          r.word.split("").map((_,j) => allWords[i][j] !== r.word[j] ? "🟩" : "⬛").join("")
        ).join("\n");
        const text = `🔤 *Ladder* · ${today}\n\n*${startWord}*\n${emojiRows}\n*${endWord}*\n\nSolved in *${rows.length} step${rows.length===1?"":"s"}*! Can you beat me?\n${SITE_URL}`;

        if (navigator.share) {
          // Native share sheet — passes emoji perfectly on mobile
          navigator.share({ text }).catch(() => {});
        } else {
          // Desktop fallback: copy to clipboard then open WhatsApp web
          navigator.clipboard.writeText(text).then(() => {
            alert("Copied to clipboard! Paste it into WhatsApp.");
          }).catch(() => {
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
          });
        }
      }

      return (
        <>
          <Confetti active={confetti} />

          <div className="app" onClick={focus}>
            <input ref={inputRef} className="hidden-input" onKeyDown={handleKey} readOnly autoFocus />

            {/* Header */}
            <div className="header">
              <div className="header-title">Ladder</div>
              <div className="header-icons">
                <button className="icon-btn" onClick={e=>{e.stopPropagation();setShowStats(true);}}>📊</button>
                <button className="icon-btn" onClick={e=>{e.stopPropagation();setShowHelp(true);}}>❓</button>
              </div>
            </div>
            <div className="sub-label">Change 1 letter per step · {today}</div>

            {/* Grid */}
            <div className="grid">
              <WordRow word={startWord} anchor />
              {rows.map((r,i) => (
                <WordRow key={i} word={r.word} color={ROW_COLORS[(i+1)%ROW_COLORS.length]} prevWord={allWords[i]} />
              ))}
              {!won && rows.length < MAX_ROWS && <ActiveRow />}
              <WordRow word={endWord} anchor isEnd />
            </div>

            {/* Feedback + Submit */}
            {!won && (
              <>
                <div className={`feedback-bar ${feedback.type}`}>{feedback.text}</div>
                <button className="submit-btn" disabled={input.length !== wordLen || loading}
                  onClick={e=>{e.stopPropagation();handleSubmit();}}>
                  {loading ? "Checking…" : "Submit →"}
                </button>
              </>
            )}

            <div className="countdown-pill">Next Ladder in <strong>{countdown}</strong></div>
            <div className="footer-links">
              <span>A new puzzle every day at midnight</span>
            </div>
          </div>

          {/* Win Modal */}
          {won && (
            <div className="win-overlay" onClick={reset}>
              <div className="win-box" onClick={e=>e.stopPropagation()}>
                <div className="win-emoji">🎉</div>
                <div className="win-title">Solved!</div>
                <div className="win-sub">{startWord} → {endWord}</div>
                <div className="win-stats">
                  <div className="win-stat">
                    <div className="win-stat-val">{rows.length}</div>
                    <div className="win-stat-lbl">Steps</div>
                  </div>
                  {bestToday && (
                    <div className="win-stat">
                      <div className="win-stat-val">{bestToday}</div>
                      <div className="win-stat-lbl">Best</div>
                    </div>
                  )}
                </div>
                {newRecord && <div className="win-record">⭐ New personal best!</div>}
                <div className="win-actions">
                  <button className="try-again-btn" onClick={reset}>Try again</button>
                  <button className="whatsapp-btn" onClick={e=>{e.stopPropagation();shareWhatsApp();}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.549 4.107 1.51 5.833L.057 23.428a.5.5 0 0 0 .609.601l5.794-1.522A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.886 0-3.655-.516-5.17-1.415l-.37-.22-3.838 1.006 1.028-3.736-.241-.386A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                    Share on WhatsApp
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Stats Modal */}
          {showStats && (
            <div className="modal-bg" onClick={()=>setShowStats(false)}>
              <div className="modal" onClick={e=>e.stopPropagation()}>
                <button className="modal-close" onClick={()=>setShowStats(false)}>×</button>
                <h2>Your Stats</h2>
                <div className="stats-grid">
                  <div className="stat-box"><div className="stat-box-val">{stats.played}</div><div className="stat-box-lbl">Played</div></div>
                  <div className="stat-box"><div className="stat-box-val green">{stats.wins}</div><div className="stat-box-lbl">Solved</div></div>
                  <div className="stat-box"><div className="stat-box-val gold">{stats.streak}</div><div className="stat-box-lbl">Streak 🔥</div></div>
                  <div className="stat-box"><div className="stat-box-val">{stats.bestStreak}</div><div className="stat-box-lbl">Best Streak</div></div>
                  <div className="stat-box"><div className="stat-box-val green">{bestToday ?? "–"}</div><div className="stat-box-lbl">Today's Best</div></div>
                  <div className="stat-box"><div className="stat-box-val">{stats.wins>0?(stats.totalSteps/stats.wins).toFixed(1):"–"}</div><div className="stat-box-lbl">Avg Steps</div></div>
                </div>
                {stats.bestStreak > 0 && (
                  <div className="streak-bar">
                    <div className="streak-bar-label"><span>Current streak</span><span>{stats.streak} / {stats.bestStreak} best</span></div>
                    <div className="streak-bar-track"><div className="streak-bar-fill" style={{width:`${Math.min(100,(stats.streak/Math.max(stats.bestStreak,1))*100)}%`}} /></div>
                  </div>
                )}
                {stats.played===0 && <p style={{color:"#555",textAlign:"center",marginTop:"8px"}}>Play your first game to see stats!</p>}
              </div>
            </div>
          )}

          {/* Help Modal */}
          {showHelp && (
            <div className="modal-bg" onClick={()=>setShowHelp(false)}>
              <div className="modal" onClick={e=>e.stopPropagation()}>
                <button className="modal-close" onClick={()=>setShowHelp(false)}>×</button>
                <h2>How to play</h2>
                <p>Turn the <strong>start word</strong> into the <strong>target word</strong> by changing <strong>exactly one letter</strong> at a time. Every step must be a real word.</p>
                <div className="modal-example">
                  {exWords.map((w,i) => {
                    const prev = i > 0 ? exWords[i-1] : null;
                    const changed = prev ? diffPositions(prev, w) : [];
                    return (
                      <div key={w} className="ex-row">
                        {w.split("").map((l,j) => (
                          <div key={j} className={`ex-tile${changed.includes(j)?" changed-ex":""}`}
                            style={{background:ROW_COLORS[i%ROW_COLORS.length]}}>{l}</div>
                        ))}
                        {changed.length>0 && <span className="ex-label">← changed "{w[changed[0]]}"</span>}
                      </div>
                    );
                  })}
                </div>
                <p>Fewer steps = better. Beat your personal best each day!</p>
                <p style={{color:"#555"}}>New puzzle drops every day at midnight.</p>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
